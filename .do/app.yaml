name: baghdad-ai-summit
region: nyc
services:
# Backend API Service
- name: api
  github:
    repo: Muammal/Baghdad-ai-summit
    branch: main
    deploy_on_push: true
  dockerfile_path: Dockerfile
  source_dir: /
  http_port: 8080
  instance_count: 1
  instance_size_slug: basic-xxs
  routes:
  - path: /api
    preserve_path_prefix: true
  - path: /swagger
    preserve_path_prefix: true
  - path: /health
    preserve_path_prefix: true
  health_check:
    http_path: /health
  envs:
  - key: ASPNETCORE_ENVIRONMENT
    value: Production

# Frontend Service
- name: frontend
  github:
    repo: Muammal/Baghdad-ai-summit
    branch: main
    deploy_on_push: true
  dockerfile_path: front-end/Dockerfile
  source_dir: front-end
  http_port: 80
  instance_count: 1
  instance_size_slug: basic-xxs
  routes:
  - path: /
  envs:
  - key: VITE_API_URL
    value: https://aidevfest-site-777jj.ondigitalocean.app/api
  - key: NODE_ENV
    value: production
