name: baghdad-ai-summit
region: nyc
services:
- name: baghdad-ai-summit2
  github:
    repo: Muammal/Baghdad-ai-summit
    branch: main
    deploy_on_push: true
  dockerfile_path: Dockerfile
  source_dir: /
  http_port: 8080
  instance_count: 1
  instance_size_slug: basic-xxs
  routes:
  - path: /
  health_check:
    http_path: /health
  envs:
  - key: ASPNETCORE_ENVIRONMENT
    value: Production
  # PORT is automatically set by DigitalOcean - don't override ASPNETCORE_URLS
  # The Dockerfile will use PORT env var: http://+:${PORT:-8080}
