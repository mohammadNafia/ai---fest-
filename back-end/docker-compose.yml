version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: baghdad-ai-summit-db
    environment:
      POSTGRES_DB: baghdad_ai_summit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - baghdad-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baghdad-ai-summit-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=baghdad_ai_summit;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - baghdad-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  baghdad-network:
    driver: bridge
